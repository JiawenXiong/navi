<style>
:root {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface-hover: #24243a;
  --border: #2a2a3e;
  --text: #e8e8f0;
  --text-dim: #8888a0;
  --gold: #d4a84b;
  --gold-light: #f0d080;
  --gold-glow: rgba(212, 168, 75, 0.15);
  --red: #e74c5e;
  --green: #2ecc71;
  --radius: 14px;
  --shadow: 0 4px 24px rgba(0,0,0,0.4);
  --header-bg: rgba(15,15,20,0.85);
}

[data-theme="light"] {
  --bg: #f5f3ee;
  --surface: #ffffff;
  --surface-hover: #f7f5f0;
  --border: #e4e1da;
  --text: #1c1c24;
  --text-dim: #8a8a9a;
  --shadow: 0 4px 24px rgba(0,0,0,0.08);
  --header-bg: rgba(245,243,238,0.85);
}

*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }

body {
  font-family: 'Noto Sans SC', -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  line-height: 1.6;
  transition: background 0.3s, color 0.3s;
}

::selection { background: var(--gold); color: #0f0f14; }

/* Scrollbar */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }

/* Header */
.header {
  position: sticky; top: 0; z-index: 100;
  background: var(--header-bg);
  backdrop-filter: blur(20px);
  -webkit-backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
}
.header-inner {
  max-width: 1200px; margin: 0 auto;
  padding: 16px 24px;
  display: flex; align-items: center; justify-content: space-between; gap: 20px;
}
.logo {
  display: flex; align-items: center; gap: 12px;
  font-size: 22px; font-weight: 900; letter-spacing: -0.5px;
  white-space: nowrap;
}
.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--gold), var(--gold-light));
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: #0f0f14; font-weight: 700;
}
.logo span { color: var(--gold); }

.search-box {
  flex: 1; max-width: 360px; position: relative;
}
.search-box input {
  width: 100%; padding: 10px 16px 10px 40px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text); font-size: 14px;
  outline: none; transition: 0.25s;
  font-family: inherit;
}
.search-box input:focus {
  border-color: var(--gold);
  box-shadow: 0 0 0 3px var(--gold-glow);
}
.search-box input::placeholder { color: var(--text-dim); }
.search-icon {
  position: absolute; left: 12px; top: 50%; transform: translateY(-50%);
  color: var(--text-dim); font-size: 16px; pointer-events: none;
}

.count-badge {
  font-size: 13px; color: var(--text-dim);
  white-space: nowrap;
  background: var(--surface); padding: 6px 14px;
  border-radius: 20px; border: 1px solid var(--border);
}

/* Hero */
.hero {
  max-width: 1200px; margin: 0 auto;
  padding: 48px 24px 32px;
  text-align: center;
}
.hero h1 {
  font-size: clamp(28px, 5vw, 52px);
  font-weight: 900;
  letter-spacing: -1px;
  line-height: 1.2;
}
.hero h1 em { font-style: normal; color: var(--gold); }
.hero p {
  margin-top: 12px;
  color: var(--text-dim);
  font-size: 15px; max-width: 500px; margin-inline: auto;
}

/* Category filter pills */
.pills {
  max-width: 1200px; margin: 0 auto;
  padding: 0 24px 20px;
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center;
}
.pill {
  padding: 6px 18px;
  border-radius: 20px;
  background: var(--surface);
  border: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 13px; cursor: pointer;
  transition: 0.2s; user-select: none;
  font-family: inherit;
}
.pill:hover { border-color: var(--gold); color: var(--text); }
.pill.active {
  background: var(--gold);
  color: #0f0f14; border-color: var(--gold);
  font-weight: 700;
}

/* Grid */
.grid {
  max-width: 1200px; margin: 0 auto;
  padding: 0 24px 80px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 14px;
}

/* Card */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 18px 20px;
  text-decoration: none; color: inherit;
  transition: 0.25s ease;
  position: relative; overflow: hidden;
  cursor: pointer;
  display: flex; flex-direction: column; gap: 6px;
}
.card::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, var(--gold-glow), transparent 70%);
  opacity: 0; transition: 0.35s;
}
.card:hover {
  border-color: var(--gold);
  transform: translateY(-2px);
  box-shadow: var(--shadow);
}
.card:hover::before { opacity: 1; }
.card:active { transform: translateY(0); }

.card-cat {
  font-size: 11px; font-weight: 700; letter-spacing: 0.8px;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 2px;
  position: relative; z-index: 1;
}
.card-title {
  font-size: 15px; font-weight: 700;
  position: relative; z-index: 1;
  display: flex; align-items: center; gap: 8px;
}
.card-title .tag {
  font-size: 10px; font-weight: 700;
  padding: 1px 8px; border-radius: 4px;
  background: var(--gold-glow); color: var(--gold-light);
}
.card-desc {
  font-size: 12px; color: var(--text-dim);
  line-height: 1.5;
  position: relative; z-index: 1;
}
.card-url {
  font-size: 11px; color: var(--text-dim);
  opacity: 0.5; margin-top: auto;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  position: relative; z-index: 1;
}
.card:hover .card-url { opacity: 0.8; }

/* No results */
.no-results {
  grid-column: 1 / -1;
  text-align: center; padding: 60px 20px;
  color: var(--text-dim);
}
.no-results strong { color: var(--text); }

/* Footer */
.footer {
  text-align: center;
  padding: 32px 24px;
  border-top: 1px solid var(--border);
  color: var(--text-dim);
  font-size: 13px;
}

/* Animations */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(16px); }
  to { opacity: 1; transform: translateY(0); }
}
.card { animation: fadeUp 0.5s ease both; }
.card:nth-child(1) { animation-delay: 0.02s; }
.card:nth-child(2) { animation-delay: 0.04s; }
.card:nth-child(3) { animation-delay: 0.06s; }
.card:nth-child(4) { animation-delay: 0.08s; }
.card:nth-child(5) { animation-delay: 0.10s; }
.card:nth-child(6) { animation-delay: 0.12s; }
.card:nth-child(7) { animation-delay: 0.14s; }
.card:nth-child(8) { animation-delay: 0.16s; }
.card:nth-child(9) { animation-delay: 0.18s; }
.card:nth-child(10) { animation-delay: 0.20s; }
.card:nth-child(11) { animation-delay: 0.22s; }
.card:nth-child(12) { animation-delay: 0.24s; }
.card:nth-child(13) { animation-delay: 0.26s; }
.card:nth-child(14) { animation-delay: 0.28s; }
.card:nth-child(15) { animation-delay: 0.30s; }
.card:nth-child(16) { animation-delay: 0.32s; }

/* Theme Toggle */
.theme-btn {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  color: var(--text);
  font-size: 18px; line-height: 1;
  cursor: pointer; padding: 8px 10px;
  transition: 0.2s; font-family: inherit;
  flex-shrink: 0;
}
.theme-btn:hover { border-color: var(--gold); }

/* Mobile */
@media (max-width: 640px) {
  .header-inner { padding: 12px 16px; flex-wrap: wrap; }
  .logo { font-size: 18px; }
  .search-box { max-width: 100%; order: 3; }
  .count-badge { display: none; }
  .grid { grid-template-columns: 1fr; gap: 10px; padding: 0 16px 60px; }
  .hero { padding: 28px 16px 20px; }
  .pills { padding: 0 16px 16px; }
  .card { padding: 14px 16px; }
}
</style>
</head>

const cats = [...new Set(sites.map(s => s.cat))];
const grid = document.getElementById('grid');
const pills = document.getElementById('pills');
const search = document.getElementById('search');
const countBadge = document.getElementById('countBadge');
let activeCat = '全部';

function renderPills() {
  const allPill = document.createElement('button');
  allPill.className = 'pill active';
  allPill.textContent = '全部';
  allPill.dataset.cat = '全部';
  allPill.onclick = () => setCat('全部');
  pills.appendChild(allPill);
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'pill';
    btn.textContent = c;
    btn.dataset.cat = c;
    btn.onclick = () => setCat(c);
    pills.appendChild(btn);
  });
}

function setCat(c) {
  activeCat = c;
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', p.dataset.cat === c);
  });
  filterCards();
}

function filterCards() {
  const q = search.value.trim().toLowerCase();
  const filtered = sites.filter(s => {
    const matchCat = activeCat === '全部' || s.cat === activeCat;
    const matchSearch = !q || s.title.toLowerCase().includes(q) || s.desc.toLowerCase().includes(q) || s.cat.toLowerCase().includes(q);
    return matchCat && matchSearch;
  });
  renderGrid(filtered);
  countBadge.textContent = filtered.length + ' 个站点';
}

function renderGrid(items) {
  if (items.length === 0) {
    grid.innerHTML = `<div class="no-results">没有找到匹配 "<strong>${search.value}</strong>" 的站点</div>`;
    return;
  }
  grid.innerHTML = items.map((s, i) => {
    const tagHtml = s.tag ? `<span class="tag">${s.tag}</span>` : '';
    const host = s.url.replace(/^https?:\/\//, '').replace(/\/.*$/, '');
    return `<a class="card" href="${s.url}" target="_blank" rel="noopener" style="animation-delay:${(i % 16) * 0.03}s">
      <div class="card-cat">${s.cat}</div>
      <div class="card-title">${s.title}${tagHtml}</div>
      <div class="card-desc">${s.desc}</div>
      <div class="card-url">${host}</div>
    </a>`;
  }).join('');
}

function resetAll() {
  activeCat = '全部';
  search.value = '';
  document.querySelectorAll('.pill').forEach(p => {
    p.classList.toggle('active', p.dataset.cat === '全部');
  });
  filterCards();
}

renderPills();
renderGrid(sites);
countBadge.textContent = sites.length + ' 个站点';
</script>
