<title>AI & Dev 导航 · 从业者常用网站</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #f5f7fa;
    --card: #ffffff;
    --text: #1a1d23;
    --text2: #5a6170;
    --border: #e4e8ee;
    --accent: #6366f1;
    --accent2: #8b5cf6;
    --tag-bg: #eef0ff;
    --tag-text: #6366f1;
    --shadow: 0 1px 3px rgba(0,0,0,.06), 0 1px 2px rgba(0,0,0,.04);
    --radius: 12px;
    --radius-sm: 8px;
    --gap: 12px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, 'Noto Sans SC', sans-serif;
  }
  .dark {
    --bg: #0f1117;
    --card: #1a1d26;
    --text: #e8eaed;
    --text2: #9aa0a6;
    --border: #2d3140;
    --shadow: 0 1px 3px rgba(0,0,0,.3);
    --tag-bg: #23263a;
    --tag-text: #a5b4fc;
  }
  body { background: var(--bg); color: var(--text); transition: background .3s, color .3s; }
  .container { max-width: 1280px; margin: 0 auto; padding: 0 20px; }

  /* Header */
  header {
    position: sticky; top: 0; z-index: 100;
    background: color-mix(in srgb, var(--bg) 85%, transparent);
    backdrop-filter: blur(16px) saturate(1.4);
    -webkit-backdrop-filter: blur(16px) saturate(1.4);
    border-bottom: 1px solid var(--border);
  }
  header .container {
    display: flex; align-items: center; justify-content: space-between;
    height: 64px; gap: 16px;
  }
  .logo { display: flex; align-items: center; gap: 10px; font-weight: 700; font-size: 20px; white-space: nowrap; }
  .logo svg { flex-shrink: 0; }
  .logo span { background: linear-gradient(135deg, var(--accent), var(--accent2)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }
  .logo small { font-weight: 400; font-size: 13px; color: var(--text2); -webkit-text-fill-color: var(--text2); }

  .search-wrap { flex: 1; max-width: 420px; position: relative; }
  .search-wrap input {
    width: 100%; height: 40px; padding: 0 16px 0 40px;
    border: 1px solid var(--border); border-radius: 20px;
    background: var(--card); color: var(--text); font-size: 14px;
    outline: none; transition: border .2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap .icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text2); pointer-events: none; }

  header .actions { display: flex; align-items: center; gap: 8px; }
  .theme-btn {
    width: 38px; height: 38px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: var(--card); color: var(--text); cursor: pointer; display: grid; place-items: center;
    font-size: 18px; transition: all .2s;
  }
  .theme-btn:hover { border-color: var(--accent); }

  /* Categories nav */
  .cats-wrap {
    position: sticky; top: 64px; z-index: 50;
    background: color-mix(in srgb, var(--bg) 90%, transparent);
    backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    border-bottom: 1px solid var(--border);
  }
  .cats {
    display: flex; flex-wrap: wrap; gap: 4px; padding: 10px 20px; max-width: 1280px; margin: 0 auto;
  }
  .cats a {
    flex-shrink: 0; padding: 6px 14px; border-radius: 20px;
    font-size: 13px; font-weight: 500; color: var(--text2); text-decoration: none;
    transition: all .2s; white-space: nowrap;
  }
  .cats a:hover, .cats a.active { background: var(--tag-bg); color: var(--tag-text); }

  /* Section */
  main { padding: 24px 0 60px; }
  section { margin-bottom: 32px; }
  section h2 {
    display: flex; align-items: center; gap: 8px;
    font-size: 17px; font-weight: 600; margin-bottom: 14px;
    padding: 0 20px; max-width: 1280px; margin-left: auto; margin-right: auto;
  }
  section h2 .emoji { font-size: 20px; }
  section h2 .count {
    font-size: 12px; font-weight: 400; color: var(--text2);
    background: var(--tag-bg); padding: 1px 8px; border-radius: 10px;
  }

  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
    gap: var(--gap);
    padding: 0 20px;
    max-width: 1280px;
    margin: 0 auto;
  }

  .card {
    background: var(--card); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; transition: all .2s; box-shadow: var(--shadow);
    display: flex; flex-direction: column; gap: 4px;
  }
  .card:hover {
    border-color: var(--accent); box-shadow: 0 4px 12px rgba(99,102,241,.12);
    transform: translateY(-1px);
  }
  .card-top { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
  .card-title { font-size: 14px; font-weight: 600; }
  .card-title a { color: var(--text); text-decoration: none; }
  .card-title a:hover { color: var(--accent); }
  .card-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
  .card-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 2px; }
  .tag { font-size: 11px; padding: 1px 8px; border-radius: 10px; background: var(--tag-bg); color: var(--tag-text); }

  /* Scroll to top */
  .top-btn {
    position: fixed; bottom: 32px; right: 32px; z-index: 200;
    width: 44px; height: 44px; border-radius: 50%;
    background: var(--accent); color: #fff; border: none; cursor: pointer;
    display: none; place-items: center; font-size: 20px;
    box-shadow: 0 4px 16px rgba(99,102,241,.35); transition: all .2s;
  }
  .top-btn:hover { transform: scale(1.08); }
  .top-btn.show { display: grid; }

  /* Empty */
  .empty { text-align: center; padding: 60px 20px; color: var(--text2); }
  .empty svg { opacity: .3; margin-bottom: 12px; }
  .empty p { font-size: 14px; }

  @media (max-width: 640px) {
    .container { padding: 0 12px; }
    header .container { height: 56px; }
    .logo { font-size: 16px; }
    .logo small { display: none; }
    .search-wrap { max-width: 100%; }
    .grid { grid-template-columns: 1fr; padding: 0 12px; }
    section h2 { padding: 0 12px; font-size: 15px; }
    .cats { padding: 8px 12px; }
    .top-btn { bottom: 20px; right: 20px; width: 40px; height: 40px; font-size: 18px; }
  }
  @media (min-width: 641px) and (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
  }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  section { animation: fadeUp .4s ease both; }
</style>
</head>

// Render
const mainEl = document.getElementById('main');
const catList = document.getElementById('catList');
const searchInput = document.getElementById('search');

function render(filter = '') {
  const q = filter.toLowerCase().trim();
  let html = '';
  let visibleSections = 0;

  data.forEach(section => {
    const filtered = section.items.filter(item =>
      !q || item.name.toLowerCase().includes(q) || item.desc.toLowerCase().includes(q) || item.tags.some(t => t.toLowerCase().includes(q))
    );
    if (!filtered.length && q) return;
    visibleSections++;

    html += `<section data-cat="${section.name}">
      <h2>
        <span class="emoji">${section.emoji}</span> ${section.name}
        <span class="count">${filtered.length}</span>
      </h2>
      <div class="grid">`;
    filtered.forEach(item => {
      html += `<div class="card">
        <div class="card-top">
          <div class="card-title"><a href="${item.url}" target="_blank" rel="noopener">${item.name}</a></div>
        </div>
        <div class="card-desc">${item.desc}</div>
        <div class="card-tags">${item.tags.map(t => `<span class="tag">${t}</span>`).join('')}</div>
      </div>`;
    });
    html += `</div></section>`;
  });

  if (!html) {
    html = `<div class="empty">
      <svg width="48" height="48" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="24" cy="24" r="20"/><path d="M16 20l8 8 8-8" stroke-linecap="round"/></svg>
      <p>没有找到匹配 "${searchInput.value}" 的网站</p>
    </div>`;
  }

  mainEl.innerHTML = html;

  // Update cat nav active
  if (q) {
    document.querySelectorAll('.cats a').forEach(a => a.classList.remove('active'));
  }
}

// Category nav
function buildCatNav() {
  let html = '<a href="#" class="active" data-cat="all">全部</a>';
  data.forEach(s => {
    html += `<a href="#" data-cat="${s.name}">${s.emoji} ${s.name}</a>`;
  });
  catList.innerHTML = html;

  catList.addEventListener('click', e => {
    const a = e.target.closest('a');
    if (!a) return;
    e.preventDefault();
    document.querySelectorAll('.cats a').forEach(x => x.classList.remove('active'));
    a.classList.add('active');
    searchInput.value = '';
    const cat = a.dataset.cat;
    if (cat === 'all') {
      render('');
    } else {
      // Scroll to section
      const el = document.querySelector(`section[data-cat="${cat}"]`);
      if (el) {
        const offset = document.querySelector('header').offsetHeight + document.querySelector('.cats-wrap').offsetHeight;
        const top = el.getBoundingClientRect().top + window.scrollY - offset;
        window.scrollTo({ top, behavior: 'smooth' });
      }
    }
  });
}

// Search
searchInput.addEventListener('input', () => {
  render(searchInput.value);
  // Reset cat active
  document.querySelectorAll('.cats a').forEach(a => a.classList.remove('active'));
  document.querySelector('.cats a[data-cat="all"]').classList.add('active');
});

const themeToggle = document.getElementById('themeToggle');
const saved = localStorage.getItem('theme');
if (saved === 'dark' || (!saved && window.matchMedia('(prefers-color-scheme:dark)').matches)) {
  document.documentElement.classList.add('dark');
  themeToggle.textContent = '☀️';
}
themeToggle.addEventListener('click', () => {
  const isDark = document.documentElement.classList.toggle('dark');
  themeToggle.textContent = isDark ? '☀️' : '🌙';
  localStorage.setItem('theme', isDark ? 'dark' : 'light');
});

// Scroll to top
const topBtn = document.getElementById('topBtn');
window.addEventListener('scroll', () => {
  topBtn.classList.toggle('show', window.scrollY > 400);
});
topBtn.addEventListener('click', () => window.scrollTo({ top: 0, behavior: 'smooth' }));

// Initial render
buildCatNav();
render('');
</script>
</body>
</html>
