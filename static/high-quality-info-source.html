<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root {
  --bg: #0b0d11;
  --surface: #13161c;
  --surface2: #1a1f28;
  --border: #262d3a;
  --text: #e4e8ee;
  --text2: #929aab;
  --text3: #5a6275;
  --accent: #f0b429;
  --accent2: #d4900e;
  --accent-glow: rgba(240, 180, 41, 0.15);
  --nav-bg: linear-gradient(180deg, rgba(11,13,17,0.95) 0%, rgba(11,13,17,0.85) 80%, transparent 100%);
  --card-shadow: rgba(240,180,41,0.08);
  --selection: #0b0d11;
  --radius: 12px;
  --radius-sm: 6px;
}
html.light {
  --bg: #f5f2eb;
  --surface: #ffffff;
  --surface2: #f0ede6;
  --border: #e0dbd2;
  --text: #2c2a26;
  --text2: #6b6560;
  --text3: #9e9690;
  --accent: #c99200;
  --accent2: #a67700;
  --accent-glow: rgba(201, 146, 0, 0.1);
  --nav-bg: linear-gradient(180deg, rgba(245,242,235,0.95) 0%, rgba(245,242,235,0.85) 80%, transparent 100%);
  --card-shadow: rgba(201, 146, 0, 0.08);
  --selection: #ffffff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Noto Sans SC', -apple-system, sans-serif;
  background: var(--bg);
  color: var(--text);
  line-height: 1.6;
  overflow-x: hidden;
}
::selection { background: var(--accent); color: var(--selection); }

.bg-glow {
  position: fixed; inset: 0; z-index: -1;
  overflow: hidden; pointer-events: none;
}
.bg-glow::before {
  content: ''; position: absolute;
  width: 1200px; height: 1200px;
  top: -400px; left: 50%;
  transform: translateX(-50%);
  background: radial-gradient(ellipse at center, rgba(240,180,41,0.04) 0%, transparent 70%);
  animation: breathe 8s ease-in-out infinite alternate;
}
html.light .bg-glow::before {
  background: radial-gradient(ellipse at center, rgba(201,146,0,0.06) 0%, transparent 70%);
}
@keyframes breathe {
  0% { opacity: 0.4; transform: translateX(-50%) scale(1); }
  100% { opacity: 1; transform: translateX(-50%) scale(1.1); }
}

header {
  padding: 60px 24px 40px;
  text-align: center;
  position: relative;
}
header::after {
  content: ''; position: absolute;
  bottom: 0; left: 50%; transform: translateX(-50%);
  width: 200px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--accent), transparent);
}
.badge {
  display: inline-flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 500;
  letter-spacing: 3px; text-transform: uppercase;
  color: var(--accent); background: var(--accent-glow);
  padding: 4px 14px; border-radius: 20px;
  margin-bottom: 20px;
  border: 1px solid rgba(240,180,41,0.15);
}
h1 {
  font-size: clamp(32px, 6vw, 64px);
  font-weight: 900;
  letter-spacing: -0.03em;
  line-height: 1.15;
  margin-bottom: 12px;
}
h1 span {
  background: linear-gradient(135deg, var(--accent) 0%, #f5d654 50%, var(--accent2) 100%);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
}
.subtitle {
  color: var(--text2);
  font-size: clamp(14px, 2vw, 18px);
  font-weight: 300;
  max-width: 520px;
  margin: 0 auto 32px;
  letter-spacing: 0.3px;
}

.theme-toggle {
  position: fixed; top: 20px; right: 24px;
  z-index: 20;
  width: 40px; height: 40px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--surface);
  color: var(--text2);
  font-size: 18px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.3s;
}
.theme-toggle:hover {
  border-color: var(--accent);
  color: var(--accent);
  transform: scale(1.1);
}

.lang-filter {
  display: flex; justify-content: center; gap: 6px;
  margin-top: 16px;
}
.lang-btn {
  padding: 4px 14px;
  border: 1px solid var(--border);
  border-radius: 16px;
  background: transparent;
  color: var(--text2);
  font-size: 12px; font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
}
.lang-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}
.lang-btn.active {
  background: var(--accent);
  color: var(--selection);
  border-color: var(--accent);
  font-weight: 600;
}

.search-box {
  max-width: 480px; margin: 0 auto;
  position: relative;
}
.search-box input {
  width: 100%; padding: 12px 20px 12px 44px;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 100px;
  color: var(--text);
  font-size: 14px; font-family: inherit;
  outline: none; transition: all 0.3s;
}
.search-box input:focus {
  border-color: var(--accent);
  box-shadow: 0 0 0 4px var(--accent-glow);
}
.search-box input::placeholder { color: var(--text3); }
.search-box .icon {
  position: absolute; left: 16px; top: 50%;
  transform: translateY(-50%);
  color: var(--text3); font-size: 16px;
  pointer-events: none;
}

.stats {
  display: flex; justify-content: center; gap: 24px;
  margin-top: 20px;
  font-size: 13px; color: var(--text3);
}
.stats strong { color: var(--text); font-weight: 500; }

nav.categories-nav {
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
  gap: 6px;
  padding: 24px 16px 8px;
  position: sticky;
  top: 0;
  z-index: 10;
  background: var(--nav-bg);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
}
.nav-btn {
  padding: 6px 14px;
  border: 1px solid var(--border);
  border-radius: 20px;
  background: transparent;
  color: var(--text2);
  font-size: 12px; font-family: inherit;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.nav-btn:hover {
  border-color: var(--accent);
  color: var(--accent);
  background: var(--accent-glow);
}
.nav-btn.active {
  background: var(--accent);
  color: var(--selection);
  border-color: var(--accent);
  font-weight: 600;
}

main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 20px 24px 80px;
}

.section {
  margin-bottom: 48px;
  opacity: 0;
  transform: translateY(20px);
  transition: all 0.5s ease;
}
.section.visible { opacity: 1; transform: translateY(0); }

.section-header {
  display: flex; align-items: center;
  gap: 12px; margin-bottom: 20px;
  padding-bottom: 8px;
  border-bottom: 1px solid var(--border);
}
.section-icon {
  width: 32px; height: 32px;
  display: flex; align-items: center; justify-content: center;
  border-radius: 8px;
  background: var(--accent-glow);
  color: var(--accent);
  font-size: 16px;
}
.section h2 {
  font-size: 18px; font-weight: 700;
  letter-spacing: 0.5px;
}
.section .count {
  font-size: 12px; color: var(--text3);
  font-weight: 400;
  margin-left: auto;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 10px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px 18px;
  text-decoration: none;
  color: inherit;
  transition: all 0.25s ease;
  display: flex; flex-direction: column;
  position: relative;
  overflow: hidden;
}
.card::before {
  content: ''; position: absolute;
  top: 0; left: 0; right: 0; height: 2px;
  background: var(--accent);
  transform: scaleX(0);
  transform-origin: left;
  transition: transform 0.3s ease;
}
.card:hover::before { transform: scaleX(1); }
.card:hover {
  border-color: var(--accent);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px var(--card-shadow);
}
.card:active { transform: translateY(0); }

.card-name {
  font-size: 14px; font-weight: 600;
  margin-bottom: 2px;
  display: flex; align-items: center; gap: 6px;
}
.card-desc {
  font-size: 12px; color: var(--text3);
  line-height: 1.4;
  flex: 1;
}
.card-meta {
  margin-top: 8px;
  display: flex; align-items: center; gap: 6px;
}
.tag {
  font-size: 10px;
  padding: 1px 8px;
  border-radius: 10px;
  background: var(--surface2);
  color: var(--text2);
  border: 1px solid var(--border);
  white-space: nowrap;
}
.tag.ai { border-color: rgba(240,180,41,0.3); color: var(--accent); }
.tag.dev { border-color: rgba(100,200,255,0.3); color: #64c8ff; }
.tag.fin { border-color: rgba(100,255,180,0.3); color: #64ffb4; }
.tag.news { border-color: rgba(255,150,100,0.3); color: #ff9664; }
.tag.overseas { border-color: rgba(180,140,255,0.3); color: #b48cff; }
.tag.comm { border-color: rgba(255,200,100,0.3); color: #ffc864; }
.tag.data { border-color: rgba(100,220,255,0.3); color: #64dcff; }

.card .arrow {
  margin-left: auto;
  color: var(--text3);
  font-size: 12px;
  transition: transform 0.2s, color 0.2s;
}
.card:hover .arrow { transform: translateX(3px); color: var(--accent); }

.tag-zh { border-color: rgba(240,80,80,0.3) !important; color: #f05050 !important; }
.tag-en { border-color: rgba(80,160,255,0.3) !important; color: #50a0ff !important; }

.note-card {
  background: rgba(240,180,41,0.04);
  border: 1px solid rgba(240,180,41,0.12);
  border-radius: var(--radius);
  padding: 16px 20px;
  margin-top: 12px;
  font-size: 13px; color: var(--text2);
  line-height: 1.5;
}
.note-card strong { color: var(--accent); font-weight: 500; }

footer {
  text-align: center;
  padding: 32px 24px;
  border-top: 1px solid var(--border);
  color: var(--text3);
  font-size: 12px;
  letter-spacing: 0.3px;
}

@media (max-width: 640px) {
  header { padding: 36px 16px 28px; }
  .stats { gap: 12px; font-size: 12px; flex-wrap: wrap; }
  .lang-filter { flex-wrap: wrap; }
  nav.categories-nav {
    padding: 16px 12px 4px;
    gap: 4px;
  }
  .nav-btn { font-size: 11px; padding: 4px 10px; }
  main { padding: 16px 12px 60px; }
  .grid { grid-template-columns: 1fr; gap: 8px; }
  .section { margin-bottom: 32px; }
  .card { padding: 14px 16px; }
}

@media (min-width: 641px) and (max-width: 1024px) {
  .grid { grid-template-columns: repeat(2, 1fr); }
}

.fade-in { animation: fadeUp 0.4s ease forwards; }
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.no-results {
  text-align: center; padding: 60px 20px;
  color: var(--text3); font-size: 14px;
  display: none;
}
</style>
</head>

<main id="main"></main>

let total = 0;
data.forEach(s => total += s.items.length);
document.getElementById('totalCount').textContent = total;

function setTheme(theme) {
  const html = document.documentElement;
  const btn = document.getElementById('themeToggle');
  if (theme === 'light') {
    html.classList.add('light');
    btn.textContent = '☀️';
  } else {
    html.classList.remove('light');
    btn.textContent = '🌙';
  }
  localStorage.setItem('theme', theme);
}

function toggleTheme() {
  const html = document.documentElement;
  setTheme(html.classList.contains('light') ? 'dark' : 'light');
}

(function initTheme() {
  const saved = localStorage.getItem('theme');
  if (saved) {
    setTheme(saved);
    return;
  }
  const h = new Date().getHours();
  setTheme(h >= 6 && h < 18 ? 'light' : 'dark');
})();

let currentLang = 'all';
let currentCat = 'all';

function setLang(el) {
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  currentLang = el.dataset.lang;
  document.getElementById('search').value = '';
  applyFilters();
}

function render() {
  const nav = document.getElementById('nav');
  const main = document.getElementById('main');
  nav.innerHTML = '';
  main.innerHTML = '';

  const allBtn = document.createElement('button');
  allBtn.className = 'nav-btn active';
  allBtn.textContent = '全部';
  allBtn.dataset.cat = 'all';
  nav.appendChild(allBtn);

  data.forEach((section, i) => {
    const btn = document.createElement('button');
    btn.className = 'nav-btn';
    btn.textContent = section.icon + ' ' + section.name;
    btn.dataset.cat = 'cat' + i;
    nav.appendChild(btn);
  });

  data.forEach((section, i) => {
    const sec = document.createElement('div');
    sec.className = 'section visible';
    sec.id = 'cat' + i;

    let itemsHtml = '';
    section.items.forEach(item => {
      itemsHtml += `
        <a href="${item.url}" target="_blank" rel="noopener" class="card" data-lang="${item.lang}">
          <div class="card-name">
            ${item.name}
            <span class="arrow">↗</span>
          </div>
          <div class="card-desc">${item.desc}</div>
          <div class="card-meta">
            <span class="tag ${item.tagClass}">${item.tag}</span>
            <span class="tag lang-tag ${item.lang === 'zh' ? 'tag-zh' : 'tag-en'}">${item.lang === 'zh' ? '中' : 'EN'}</span>
          </div>
        </a>
      `;
    });

    sec.innerHTML = `
      <div class="section-header">
        <div class="section-icon">${section.icon}</div>
        <h2>${section.name}</h2>
        <span class="count">${section.items.length} 个网站</span>
      </div>
      <div class="grid">${itemsHtml}</div>
    `;
    main.appendChild(sec);
  });

  const noRes = document.createElement('div');
  noRes.className = 'no-results';
  noRes.id = 'noResults';
  noRes.textContent = '没有找到匹配的网站，试试其他关键词';
  main.appendChild(noRes);

  nav.addEventListener('click', e => {
    if (e.target.classList.contains('nav-btn')) {
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
      e.target.classList.add('active');
      currentCat = e.target.dataset.cat;
      document.getElementById('search').value = '';
      applyFilters();
    }
  });
}

function applyFilters() {
  const q = document.getElementById('search').value.trim().toLowerCase();

  let anyVisible = false;

  document.querySelectorAll('.section').forEach(sec => {
    if (currentCat !== 'all' && sec.id !== currentCat) {
      sec.style.display = 'none';
      return;
    }
    const cards = sec.querySelectorAll('.card');
    let secHasVisible = false;
    cards.forEach(card => {
      let show = true;
      if (currentLang !== 'all' && card.dataset.lang !== currentLang) show = false;
      if (show && q) {
        const text = card.textContent.toLowerCase();
        if (!text.includes(q)) show = false;
      }
      card.style.display = show ? '' : 'none';
      if (show) secHasVisible = true;
    });
    sec.style.display = secHasVisible ? '' : 'none';
    if (secHasVisible) anyVisible = true;
  });

  document.getElementById('noResults').style.display = anyVisible ? 'none' : 'block';
}

function filterCards() {
  applyFilters();
}

render();
